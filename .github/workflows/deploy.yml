name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    
permissions:
  contents: write

env:
  PUBLIC_ENVIRONMENT: prod
  ENVIRONMENT: prod
  BASE_URL: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install and Build 🧑‍💻
        run: |
          npm install
          npm run build
          
      - name: Deployment 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
